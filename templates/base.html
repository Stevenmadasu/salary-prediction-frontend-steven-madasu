<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Prediction — Steven Madasu</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1nDaVac2i44F3mb5Y5e0g/QHniU15kR" crossorigin="anonymous">
    <style>
        :root {
            --navy: #1b2a4a;
            --navy-light: #243556;
            --blue-mid: #3a5a8c;
            --grey-50: #f8f9fa;
            --grey-100: #f1f3f5;
            --grey-200: #e2e6ea;
            --grey-400: #adb5bd;
            --grey-600: #6c757d;
            --grey-800: #343a40;
            --white: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--grey-100);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--grey-800);
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .site-header {
            background: var(--navy);
            padding: 1.1rem 0;
        }
        .site-header h1 {
            color: var(--white);
            font-weight: 700;
            font-size: 1.25rem;
            margin: 0;
            letter-spacing: 0.3px;
        }
        .site-header .subtitle {
            color: var(--grey-400);
            font-size: 0.82rem;
            margin: 0.15rem 0 0 0;
        }

        /* ── Main content ── */
        main {
            flex: 1;
            padding: 2.5rem 0;
        }

        /* ── Card ── */
        .main-card {
            background: var(--white);
            border: 1px solid var(--grey-200);
            border-radius: 10px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }
        .main-card .card-header {
            background: var(--navy);
            border: none;
            border-radius: 0 !important;
            padding: 1.25rem 1.75rem;
        }
        .main-card .card-header h2 {
            color: var(--white);
            font-weight: 600;
            font-size: 1.15rem;
            margin: 0;
        }
        .main-card .card-header p {
            color: var(--grey-400);
            margin: 0.2rem 0 0 0;
            font-size: 0.85rem;
        }
        .main-card .card-body {
            padding: 1.75rem;
        }

        /* ── Form ── */
        .form-label {
            font-weight: 600;
            color: var(--navy);
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
        }
        .form-select {
            border: 1px solid var(--grey-200);
            border-radius: 6px;
            padding: 0.55rem 0.75rem;
            font-size: 0.9rem;
            color: var(--grey-800);
            background-color: var(--white);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-select:focus {
            border-color: var(--blue-mid);
            box-shadow: 0 0 0 3px rgba(58, 90, 140, 0.15);
        }

        /* ── Button ── */
        .btn-predict {
            background: var(--navy);
            border: none;
            border-radius: 6px;
            padding: 0.65rem 2.25rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--white);
            transition: background 0.2s, box-shadow 0.2s;
        }
        .btn-predict:hover {
            background: var(--navy-light);
            box-shadow: 0 4px 14px rgba(27, 42, 74, 0.25);
            color: var(--white);
        }
        .btn-predict:active {
            background: var(--blue-mid);
        }

        /* ── Result ── */
        .result-card {
            background: var(--navy);
            border-radius: 8px;
            color: var(--white);
            padding: 1.25rem 1.5rem;
            margin-top: 1.5rem;
        }
        .result-card .result-label {
            font-size: 0.82rem;
            color: var(--grey-400);
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .result-card .result-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--white);
        }
        .result-error {
            background: #c0392b;
        }

        /* ── Footer ── */
        footer {
            background: var(--grey-50);
            border-top: 1px solid var(--grey-200);
            color: var(--grey-600);
            font-size: 0.78rem;
            padding: 1.25rem 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <div class="container">
            <h1>Salary Prediction</h1>
            <p class="subtitle">Steven Madasu — BAIS:3300 Digital Product Development</p>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            Steven Madasu &middot; BAIS:3300 &middot; Salary Prediction Front End
        </div>
    </footer>

    <!-- Bootstrap 5.3 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
