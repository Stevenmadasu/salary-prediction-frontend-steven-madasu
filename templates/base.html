<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Prediction — Steven Madasu</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1nDaVac2i44F3mb5Y5e0g/QHniU15kR" crossorigin="anonymous">
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .hero-header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }
        .hero-header h1 {
            color: #fff;
            font-weight: 700;
            font-size: 1.5rem;
            margin: 0;
        }
        .hero-header .subtitle {
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            margin: 0;
        }
        .main-card {
            background: rgba(255,255,255,0.95);
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .main-card .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px 16px 0 0 !important;
            border: none;
            padding: 1.5rem 2rem;
        }
        .main-card .card-header h2 {
            color: #fff;
            font-weight: 700;
            font-size: 1.35rem;
            margin: 0;
        }
        .main-card .card-header p {
            color: rgba(255,255,255,0.8);
            margin: 0.25rem 0 0 0;
            font-size: 0.9rem;
        }
        .main-card .card-body {
            padding: 2rem;
        }
        .form-label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.9rem;
            margin-bottom: 0.35rem;
        }
        .form-select {
            border-radius: 8px;
            border: 2px solid #e0e5ec;
            padding: 0.6rem 0.75rem;
            font-size: 0.9rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-predict {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 0.75rem 2.5rem;
            font-weight: 600;
            font-size: 1.05rem;
            color: #fff;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            color: #fff;
        }
        .result-card {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            border: none;
            border-radius: 12px;
            color: #fff;
            padding: 1.5rem 2rem;
            margin-top: 1.5rem;
        }
        .result-card .result-label {
            font-size: 0.9rem;
            opacity: 0.9;
            margin-bottom: 0.25rem;
        }
        .result-card .result-value {
            font-size: 2.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .result-error {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
        footer {
            color: rgba(255,255,255,0.4);
            font-size: 0.8rem;
            padding: 2rem 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="hero-header">
        <div class="container">
            <h1>💰 Salary Prediction Tool</h1>
            <p class="subtitle">Welcome Steven Madasu — BAIS:3300 Digital Product Development</p>
        </div>
    </div>

    {% block content %}{% endblock %}

    <footer>
        <div class="container">
            Steven Madasu &bull; BAIS:3300 &bull; Salary Prediction Front End
        </div>
    </footer>

    <!-- Bootstrap 5.3 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
